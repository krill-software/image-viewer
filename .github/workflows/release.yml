name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & publish (linux-x64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf \
            file

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build & upload release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Image Viewer ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          releaseBody: |
            ## Install

            **Debian / Ubuntu** — sets the app as a candidate "Open with…" for image files:

            ```sh
            sudo dpkg -i Image\ Viewer_*_amd64.deb
            ```

            **AppImage** — portable, any Linux x86_64:

            ```sh
            chmod +x Image\ Viewer_*.AppImage
            ./Image\ Viewer_*.AppImage path/to/photo.jpg
            ```

            Verify with `sha256sum -c SHA256SUMS`.
